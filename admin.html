<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>하늘매트 | 통합 관리자 대시보드</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root {
      --primary: #1565C0;
      --primary-dark: #0D47A1;
      --bg: #F8FAFC;
      --white: #FFFFFF;
      --text: #1E293B;
      --text-light: #64748B;
      --border: #E2E8F0;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); }
    
    /* Login Overlay */
    #loginOverlay {
      position: fixed; inset: 0; background: var(--primary-dark); z-index: 9999;
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: var(--white); padding: 40px; border-radius: 20px; width: 100%; max-width: 400px;
      text-align: center; box-shadow: var(--shadow);
    }
    .login-box h2 { margin-bottom: 24px; color: var(--primary); }
    .login-box input {
      width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 8px;
      margin-bottom: 16px; font-size: 1rem; text-align: center;
    }
    .login-box button {
      width: 100%; padding: 14px; background: var(--primary); color: #fff;
      border: none; border-radius: 8px; font-weight: 700; cursor: pointer;
    }

    /* Layout */
    .admin-wrapper { display: flex; min-height: 100vh; display: none; }
    .sidebar { width: 260px; background: #fff; border-right: 1px solid var(--border); padding: 30px 20px; }
    .sidebar h1 { font-size: 1.25rem; font-weight: 800; color: var(--primary); margin-bottom: 40px; display: flex; align-items: center; gap: 8px; }
    .nav-item {
      padding: 12px 16px; border-radius: 10px; color: var(--text-light); cursor: pointer;
      display: flex; align-items: center; gap: 12px; margin-bottom: 8px; transition: 0.2s;
    }
    .nav-item:hover, .nav-item.active { background: #EFF6FF; color: var(--primary); font-weight: 600; }

    .main-content { flex: 1; padding: 40px; overflow-y: auto; }
    .page-header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
    .page-header h2 { font-size: 1.5rem; font-weight: 700; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 40px; }
    .stat-card { background: #fff; padding: 24px; border-radius: 16px; box-shadow: var(--shadow); }
    .stat-card .label { color: var(--text-light); font-size: 0.875rem; margin-bottom: 8px; }
    .stat-card .value { font-size: 1.75rem; font-weight: 800; color: var(--primary); }

    /* Chart Area */
    .chart-container { background: #fff; padding: 24px; border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 40px; min-height: 300px; }

    /* Table */
    .table-card { background: #fff; border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; }
    .table-header { padding: 20px 24px; border-bottom: 1px solid var(--border); font-weight: 700; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 16px 24px; background: #F8FAFC; color: var(--text-light); font-size: 0.875rem; }
    td { padding: 16px 24px; border-bottom: 1px solid #F1F5F9; font-size: 0.9375rem; }
    .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
    .bg-blue { background: #E0F2FE; color: #0369A1; }

    @media (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

  <!-- Login Area -->
  <div id="loginOverlay">
    <div class="login-box">
      <h2>관리자 인증</h2>
      <input type="password" id="adminPass" placeholder="비밀번호를 입력하세요">
      <button onclick="checkAdmin()">로그인</button>
    </div>
  </div>

  <div class="admin-wrapper" id="adminWrapper">
    <aside class="sidebar">
      <h1><i class="fa-solid fa-cloud-bolt"></i> SKYMAT Admin</h1>
      <nav>
        <div class="nav-item active"><i class="fa-solid fa-chart-line"></i> 대시보드</div>
        <div class="nav-item"><i class="fa-solid fa-file-invoice"></i> 상담 신청 목록</div>
        <div class="nav-item"><i class="fa-solid fa-users"></i> 유입 분석</div>
        <div class="nav-item"><i class="fa-solid fa-gear"></i> 설정</div>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h2>통합 대시보드</h2>
        <div id="currentTime" style="color:var(--text-light);">—</div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="label">오늘 접수</div>
          <div class="value" id="todayCount">0</div>
        </div>
        <div class="stat-card">
          <div class="label">누적 접수</div>
          <div class="value" id="totalCount">0</div>
        </div>
        <div class="stat-card">
          <div class="label">최근 7일 유입</div>
          <div class="value">2,841</div>
        </div>
        <div class="stat-card">
          <div class="label">광고 전환율</div>
          <div class="value">4.2%</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="mainChart"></canvas>
      </div>

      <div class="table-card">
        <div class="table-header">최근 상담 신청 현황</div>
        <table>
          <thead>
            <tr>
              <th>접수일시</th>
              <th>성함</th>
              <th>연락처</th>
              <th>주소</th>
              <th>유입경로</th>
              <th>상태</th>
            </tr>
          </thead>
          <tbody id="submissionList">
            <!-- 데이터 로딩 예정 -->
            <tr>
              <td colspan="6" style="text-align:center; padding: 40px; color: var(--text-light);">데이터를 불러오는 중...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const CORRECT_PASS = "skymat2026"; // 마스터 비밀번호

    function checkAdmin() {
      const pass = document.getElementById('adminPass').value;
      if (pass === CORRECT_PASS) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('adminWrapper').style.display = 'flex';
        initAdmin();
      } else {
        alert('비밀번호가 틀렸습니다.');
      }
    }

    function initAdmin() {
      updateTime();
      setInterval(updateTime, 1000);
      renderChart();
      loadMockSubmissions();
      
      // 실제 구글 시트 연동 시 아래 fetch 활성화
      // fetchSubmissions();
    }

    function updateTime() {
      const now = new Date();
      document.getElementById('currentTime').textContent = now.toLocaleString('ko-KR');
    }

    function renderChart() {
      const ctx = document.getElementById('mainChart').getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
          datasets: [{
            label: '상담 접수 추이',
            data: [12, 19, 15, 25, 22, 10, 8],
            borderColor: '#1565C0',
            backgroundColor: 'rgba(21, 101, 192, 0.1)',
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } }
        }
      });
    }

    function loadMockSubmissions() {
      const list = document.getElementById('submissionList');
      const mockData = [
        { date: '2026.04.16 12:45', name: '김철수', phone: '010-1234-****', addr: '인천 연수구...', via: '네이버 검색', status: '접수완료' },
        { date: '2026.04.16 11:30', name: '이영희', phone: '010-5678-****', addr: '경기 김포시...', via: '인스타그램 광고', status: '상담중' },
      ];

      list.innerHTML = mockData.map(item => `
        <tr>
          <td>${item.date}</td>
          <td>${item.name}</td>
          <td>${item.phone}</td>
          <td>${item.addr}</td>
          <td>${item.via}</td>
          <td><span class="status-badge bg-blue">${item.status}</span></td>
        </tr>
      `).join('');

      document.getElementById('todayCount').textContent = mockData.length;
      document.getElementById('totalCount').textContent = '1,248';
    }
  </script>
</body>
</html>
