<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" fill="none">
  <defs>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="matBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="matSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#29B6F6"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
    <linearGradient id="wallLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CFD8DC"/>
      <stop offset="100%" stop-color="#ECEFF1"/>
    </linearGradient>
    <linearGradient id="wallRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B0BEC5"/>
      <stop offset="100%" stop-color="#CFD8DC"/>
    </linearGradient>
    <linearGradient id="wallTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="100%" stop-color="#CFD8DC"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#1565C0" flood-opacity="0.18"/>
    </filter>
    <filter id="matShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="3" stdDeviation="3" flood-color="#0D47A1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ===== 방 바닥 (등각투영) ===== -->
  <!-- 바닥면 -->
  <polygon points="320,90 580,230 320,370 60,230" fill="url(#floorGrad)" stroke="#90CAF9" stroke-width="1.5"/>

  <!-- 왼쪽 벽 -->
  <polygon points="60,230 60,130 320,270 320,370" fill="url(#wallLeft)" stroke="#B0BEC5" stroke-width="1"/>
  <!-- 오른쪽 벽 -->
  <polygon points="580,230 580,130 320,270 320,370" fill="url(#wallRight)" stroke="#90A4AE" stroke-width="1"/>
  <!-- 천장 (뒤쪽) -->
  <polygon points="320,90 60,230 60,130 320,-10 580,130 580,230" fill="url(#wallTop)" stroke="#CFD8DC" stroke-width="1"/>

  <!-- 천장면 -->
  <polygon points="320,-10 60,130 320,270 580,130" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1" opacity="0.6"/>

  <!-- ===== 매트 타일 (거실) ===== -->
  <!-- 매트 행 1 -->
  <g filter="url(#matShadow)">
    <!-- 행1 타일 1 -->
    <polygon points="200,210 240,188 280,210 240,232" fill="url(#matBlue)" stroke="#1565C0" stroke-width="0.8" opacity="0.92"/>
    <!-- 행1 타일 2 -->
    <polygon points="240,188 280,166 320,188 280,210" fill="url(#matBlue)" stroke="#1565C0" stroke-width="0.8" opacity="0.92"/>
    <!-- 행1 타일 3 -->
    <polygon points="280,166 320,144 360,166 320,188" fill="url(#matBlue)" stroke="#1565C0" stroke-width="0.8" opacity="0.92"/>
    <!-- 행1 타일 4 -->
    <polygon points="320,144 360,122 400,144 360,166" fill="url(#matBlue)" stroke="#1565C0" stroke-width="0.8" opacity="0.92"/>

    <!-- 행2 타일 -->
    <polygon points="160,232 200,210 240,232 200,254" fill="url(#matSky)" stroke="#0288D1" stroke-width="0.8" opacity="0.9"/>
    <polygon points="200,254 240,232 280,254 240,276" fill="url(#matSky)" stroke="#0288D1" stroke-width="0.8" opacity="0.9"/>
    <polygon points="240,232 280,210 320,232 280,254" fill="url(#matBlue)" stroke="#1565C0" stroke-width="0.8" opacity="0.92"/>
    <polygon points="280,210 320,188 360,210 320,232" fill="url(#matBlue)" stroke="#1565C0" stroke-width="0.8" opacity="0.92"/>
    <polygon points="320,188 360,166 400,188 360,210" fill="url(#matBlue)" stroke="#1565C0" stroke-width="0.8" opacity="0.92"/>
    <polygon points="360,166 400,144 440,166 400,188" fill="url(#matSky)" stroke="#0288D1" stroke-width="0.8" opacity="0.9"/>

    <!-- 행3 타일 -->
    <polygon points="160,276 200,254 240,276 200,298" fill="url(#matBlue)" stroke="#1565C0" stroke-width="0.8" opacity="0.92"/>
    <polygon points="200,298 240,276 280,298 240,320" fill="url(#matBlue)" stroke="#1565C0" stroke-width="0.8" opacity="0.92"/>
    <polygon points="240,276 280,254 320,276 280,298" fill="url(#matSky)" stroke="#0288D1" stroke-width="0.8" opacity="0.9"/>
    <polygon points="280,254 320,232 360,254 320,276" fill="url(#matSky)" stroke="#0288D1" stroke-width="0.8" opacity="0.9"/>
    <polygon points="320,232 360,210 400,232 360,254" fill="url(#matBlue)" stroke="#1565C0" stroke-width="0.8" opacity="0.92"/>
    <polygon points="360,210 400,188 440,210 400,232" fill="url(#matBlue)" stroke="#1565C0" stroke-width="0.8" opacity="0.92"/>
    <polygon points="400,188 440,166 480,188 440,210" fill="url(#matSky)" stroke="#0288D1" stroke-width="0.8" opacity="0.9"/>
  </g>

  <!-- ===== 소파 (오른쪽 상단) ===== -->
  <g opacity="0.85">
    <!-- 소파 바닥 -->
    <polygon points="430,155 510,111 530,122 450,166" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
    <!-- 소파 등받이 -->
    <polygon points="430,155 430,138 510,94 510,111" fill="#90A4AE" stroke="#546E7A" stroke-width="1"/>
    <!-- 소파 측면 -->
    <polygon points="510,111 530,122 530,105 510,94" fill="#607D8B" stroke="#546E7A" stroke-width="1"/>
    <!-- 소파 쿠션 선 -->
    <line x1="470" y1="133" x2="470" y2="155" stroke="#546E7A" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- ===== 커피 테이블 ===== -->
  <g opacity="0.8">
    <polygon points="350,220 410,186 425,194 365,228" fill="#A1887F" stroke="#795548" stroke-width="0.8"/>
    <polygon points="350,220 350,213 410,179 410,186" fill="#BCAAA4" stroke="#795548" stroke-width="0.8"/>
    <polygon points="410,186 425,194 425,187 410,179" fill="#8D6E63" stroke="#795548" stroke-width="0.8"/>
  </g>

  <!-- ===== 화분 (왼쪽 코너) ===== -->
  <g transform="translate(140,255)">
    <!-- 화분 몸체 -->
    <ellipse cx="0" cy="0" rx="12" ry="7" fill="#795548"/>
    <rect x="-12" y="-18" width="24" height="18" fill="#795548" rx="2"/>
    <ellipse cx="0" cy="-18" rx="12" ry="7" fill="#8D6E63"/>
    <!-- 식물 -->
    <ellipse cx="0" cy="-28" rx="14" ry="9" fill="#43A047" opacity="0.9"/>
    <ellipse cx="-8" cy="-33" rx="8" ry="6" fill="#388E3C" opacity="0.85"/>
    <ellipse cx="8" cy="-33" rx="8" ry="6" fill="#2E7D32" opacity="0.85"/>
  </g>

  <!-- ===== 매트 라벨 ===== -->
  <g filter="url(#shadow)">
    <rect x="220" y="310" width="200" height="36" rx="18" fill="#1565C0"/>
    <text x="320" y="333" font-family="'Noto Sans KR',sans-serif" font-size="13" font-weight="700"
          fill="white" text-anchor="middle" letter-spacing="0.5">하늘매트 시공면적</text>
  </g>

  <!-- ===== 치수선 ===== -->
  <!-- 가로 치수 -->
  <line x1="160" y1="375" x2="380" y2="375" stroke="#1565C0" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="160" y1="370" x2="160" y2="380" stroke="#1565C0" stroke-width="1.5" opacity="0.6"/>
  <line x1="380" y1="370" x2="380" y2="380" stroke="#1565C0" stroke-width="1.5" opacity="0.6"/>
  <text x="270" y="393" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="600" opacity="0.8">600 / 700 / 800 / 1000 / 1200 mm</text>

  <!-- ===== 아이콘 범례 ===== -->
  <rect x="460" y="300" width="155" height="90" rx="10" fill="white" stroke="#E3F2FD" stroke-width="1.5" opacity="0.95"/>
  <text x="537" y="320" font-family="'Noto Sans KR',sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="700">범례</text>
  <!-- 파란 매트 -->
  <rect x="472" y="330" width="16" height="10" rx="2" fill="url(#matBlue)"/>
  <text x="494" y="340" font-family="'Noto Sans KR',sans-serif" font-size="10" fill="#333">하늘매트 (거실)</text>
  <!-- 하늘 매트 -->
  <rect x="472" y="348" width="16" height="10" rx="2" fill="url(#matSky)"/>
  <text x="494" y="358" font-family="'Noto Sans KR',sans-serif" font-size="10" fill="#333">하늘매트 (복도)</text>
  <!-- SGS 인증 표기 -->
  <text x="472" y="380" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" font-weight="600" opacity="0.7">SGS 충격흡수율 98% 인증</text>

  <!-- ===== 타이틀 ===== -->
  <text x="320" y="26" font-family="'Noto Sans KR',Arial,sans-serif" font-size="14" font-weight="700"
        fill="#0D47A1" text-anchor="middle" letter-spacing="1">시공 공간 3D 배치 도면</text>
  <text x="320" y="45" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle"
        opacity="0.65" letter-spacing="2">SKYMAT INSTALLATION GUIDE</text>
</svg>
